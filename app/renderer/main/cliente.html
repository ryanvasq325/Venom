<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-white">
    <div class="container mt-4" style="max-width: 480px;">
      <div class="row">
        <div class="col-12">
            <h5 class="">Cadastro de Clientes</h5>
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
              <li class="breadcrumb-item">
                <span
                  onclick="window.electronAPI.openPage('index.html')"
                  style="cursor: pointer"
                  >Home</span>
              </li>
              <li class="breadcrumb-item">
                <span
                  onclick="window.electronAPI.openPage('listacliente.html')"
                  style="cursor: pointer"
                  >Lista de Clientes</span>
              </li>
              <li class="breadcrumb-item active" aria-current="page">
                Cadastro de Clientes
              </li>
            </ol>
          </nav>
        </div>
      </div>

                <div class="mb-3">
                    <input type="text" class="form-control" placeholder="Nome do Cliente" id="name">
                </div>

                <div class="mb-4">
                    <input type="text" class="form-control" placeholder="CPF do Cliente" id="cpf">
                </div>

                <button id="save-button" class="btn btn-primary w-100">Salvar cliente</button>
            </div>
        </div>
    </div>

    <script src="cliente.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.23.0/sweetalert2.min.js" integrity="sha512-pnPZhx5S+z5FSVwy62gcyG2Mun8h6R+PG01MidzU+NGF06/ytcm2r6+AaWMBXAnDHsdHWtsxS0dH8FBKA84FlQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</body>

</html>
