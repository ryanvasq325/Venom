<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-white">
    <div class="container mt-4" style="max-width: 480px;">
        <div class="d-flex gap-2 mb-4">
            <button class="btn btn-outline-secondary btn-sm" onclick="window.electronAPI.goHome()">Home</button>
            <button class="btn btn-outline-primary btn-sm" onclick="window.electronAPI.openPage('listaproduto.html')">Lista de produtos</button>
        </div>
<div class="container">
      <div class="row">
        <div class="col-12">
            <h5 class="">Cadastro de produtos</h5>
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
              <li class="breadcrumb-item">
                <span
                  onclick="window.electronAPI.openPage('index.html')"
                  style="cursor: pointer"
                  >Home</span>
              </li>
              <li class="breadcrumb-item">
                <span
                  onclick="window.electronAPI.openPage('listaproduto.html')"
                  style="cursor: pointer"
                  >Lista de Produtos</span>
              </li>
              <li class="breadcrumb-item active" aria-current="page">
                Cadastro de Produtos
              </li>
            </ol>
          </nav>
        </div>
      </div>

        <div class="mb-3">
                    <input type="text" class="form-control" placeholder="Nome do produto" id="name">
                </div>

                <div class="mb-4">
                    <input type="text" class="form-control" placeholder="Valor do produto" id="price">
                </div>

                <button id="save-button" class="btn btn-primary w-100">Salvar Produto</button>
            </div>
        </div>
    </div>

    <script src="produto.js"></script>
</body>

</html>
