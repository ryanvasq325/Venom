<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empresa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
</head>

<body class="bg-white">
  <div class="container mt-4" style="max-width: 480px;">
    <div class="row">
      <div class="col-12">
        <h5 class="">Cadastro de Empresas</h5>
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb">
            <li class="breadcrumb-item">
              <span onclick="window.electronAPI.openPage('index.html')" style="cursor: pointer">Home</span>
            </li>
            <li class="breadcrumb-item">
              <span onclick="window.electronAPI.openPage('listaempresa.html')" style="cursor: pointer">Lista de
                Empresas</span>
            </li>
            <li class="breadcrumb-item active" aria-current="page">
              Cadastro de Empresas
            </li>
          </ol>
        </nav>
      </div>
    </div>
    <div class="mb-3">
      <input type="text" class="form-control" placeholder="Nome do empresa" id="name">
    </div>

    <div class="mb-4">
      <input type="text" class="form-control" placeholder="Cnpj da empresa" id="cnpj">
    </div>

    <button id="save-button" class="btn btn-primary w-100">Salvar empresa</button>
  </div>
  </div>
  </div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="empresa.js"></script>
</body>

</html>
