<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark" data-bs-theme="dark">
    <div class="container mt-4" style="max-width: 480px;">
        <div class="d-flex gap-2 mb-4">
            <button class="btn btn-outline-secondary btn-sm" onclick="window.electronAPI.goHome()">Home</button>
            <button class="btn btn-outline-primary btn-sm" onclick="window.electronAPI.openPage('listausuario.html')">Lista de usuarios</button>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <h5 class="card-title mb-4">Novo Usuário</h5>

                <div class="mb-3">
                    <input type="text" class="form-control" placeholder="Nome do usuario" id="name">
                </div>

                <div class="mb-4">
                    <input type="text" class="form-control" placeholder="Email do usuario" id="email">
                </div>

                <button id="save-button" class="btn btn-primary w-100">Salvar usuario</button>
            </div>
        </div>
    </div>

    <script src="usuario.js"></script>
</body>

</html>
